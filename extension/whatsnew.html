<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>What's new in Aura</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="welcome-bg"></div>
<div class="welcome">
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <select id="wlang" class="mini lang-sel">
      <option value="en">EN</option><option value="pt">PT</option><option value="es">ES</option>
    </select>
  </div>
  <div class="brandrow">
    <img src="icons/icon128.png" alt="Aura" />
    <div>
      <h1 style="margin:0">Aura <span id="ver" style="font-size:14px;color:var(--muted);font-weight:500"></span></h1>
      <p style="margin:0" data-k="tag">A new version is here.</p>
    </div>
  </div>

  <div class="card">
    <h2 data-k="newH">What's new</h2>
    <ul id="changes" class="changes"></ul>
  </div>

  <div class="card">
    <h2 data-k="nextH">Coming next</h2>
    <ul id="next" class="changes"></ul>
  </div>

  <a class="cta" href="#" onclick="window.close()" data-k="go">Awesome — close</a>
  <p class="muted small" style="margin-top:18px;text-align:center">
    <span data-k="madeBy">Made by</span>
    <a href="https://srzking.vercel.app" target="_blank" style="color:var(--brand)">SrKing</a>
  </p>
</div>
<script>
const D = {
  en: {
    tag: "A new version is here.", newH: "What's new", nextH: "Coming next", go: "Awesome — close", madeBy: "Made by",
    changes: [
      "Platforms grouped by category (Streaming, Music, Dev, Social, AI, Learning, Productivity)",
      "Live preview while editing the custom activity",
      "Enable / Disable all sites with one click",
      "New Apps tab search bar with category counts",
      "Bug fixes: smoother token validation, cleaner reconnect, no flicker on status refresh",
      "About tab shows credits & links to SrKing",
      "Website: dashboard, full i18n on every page, PWA installable on Android"
    ],
    next: ["Electron desktop app (Windows/macOS/Linux)", "Firefox build", "Spotify desktop sync", "Custom emoji status", "Steam game detection"]
  },
  pt: {
    tag: "Nova versão disponível.", newH: "O que há de novo", nextH: "A caminho", go: "Fixe — fechar", madeBy: "Feito por",
    changes: [
      "Plataformas agrupadas por categoria (Streaming, Música, Dev, Social, IA, Aprendizagem, Produtividade)",
      "Pré-visualização ao vivo enquanto editas a atividade personalizada",
      "Ativar / Desativar todos os sites com um clique",
      "Pesquisa no separador Apps com contagem por categoria",
      "Correções: validação de token mais suave, reconexão mais limpa, sem flicker",
      "Aba 'Sobre' com créditos e link para o SrKing",
      "Website: dashboard, traduções completas em cada página, PWA instalável no Android"
    ],
    next: ["App desktop Electron (Windows/macOS/Linux)", "Versão Firefox", "Sincronização Spotify desktop", "Emoji personalizado", "Deteção de jogos Steam"]
  },
  es: {
    tag: "Nueva versión disponible.", newH: "Novedades", nextH: "Próximamente", go: "Genial — cerrar", madeBy: "Hecho por",
    changes: [
      "Plataformas agrupadas por categoría (Streaming, Música, Dev, Social, IA, Aprendizaje, Productividad)",
      "Vista previa en vivo al editar la actividad personalizada",
      "Activar / Desactivar todos los sitios con un clic",
      "Búsqueda en pestaña Apps con conteo por categoría",
      "Bugs corregidos: validación de token más suave, reconexión limpia, sin parpadeo",
      "Pestaña 'Acerca de' con créditos y link a SrKing",
      "Sitio web: dashboard, traducciones completas en cada página, PWA instalable en Android"
    ],
    next: ["App de escritorio Electron (Windows/macOS/Linux)", "Build Firefox", "Sincronización Spotify desktop", "Emoji personalizado", "Detección de juegos Steam"]
  }
};
async function apply(l){
  const d = D[l] || D.en;
  document.querySelectorAll("[data-k]").forEach(e=>{ if(typeof d[e.dataset.k]==="string") e.textContent = d[e.dataset.k]; });
  document.getElementById("changes").innerHTML = d.changes.map(c=>`<li>${c}</li>`).join("");
  document.getElementById("next").innerHTML = d.next.map(c=>`<li>${c}</li>`).join("");
  await chrome.storage?.local?.set?.({ lang:l });
}
(async()=>{
  const cfg = await chrome.storage?.local?.get?.(["lang"]) || {};
  let l = cfg.lang || (navigator.language||"en").slice(0,2);
  if(!D[l]) l="en";
  document.getElementById("wlang").value = l;
  document.getElementById("ver").textContent = "v" + (chrome.runtime.getManifest().version);
  apply(l);
  await chrome.storage?.local?.set?.({ lastSeenVersion: chrome.runtime.getManifest().version });
})();
document.getElementById("wlang").addEventListener("change", e=>apply(e.target.value));
</script>
</body>
</html>
