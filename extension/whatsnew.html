<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>What's new in Aura</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="welcome-bg"></div>
<div class="welcome">
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <select id="wlang" class="mini lang-sel">
      <option value="en">EN</option><option value="pt">PT</option><option value="es">ES</option>
    </select>
  </div>
  <div class="brandrow">
    <img src="icons/icon128.png" alt="Aura" />
    <div>
      <h1 style="margin:0">Aura <span id="ver" style="font-size:14px;color:var(--muted);font-weight:500"></span></h1>
      <p style="margin:0" data-k="tag">A new version is here.</p>
    </div>
  </div>

  <div class="card">
    <h2 data-k="newH">What's new</h2>
    <ul id="changes" class="changes"></ul>
  </div>

  <div class="card">
    <h2 data-k="nextH">Coming next</h2>
    <ul id="next" class="changes"></ul>
  </div>

  <a class="cta" href="#" onclick="window.close()" data-k="go">Awesome — close</a>
</div>
<script>
const D = {
  en: {
    tag: "A new version is here.", newH: "What's new", nextH: "Coming next", go: "Awesome — close",
    changes: [
      "New minimal play-style icon",
      "13 new platforms: Kick, GitLab, Claude, Gemini, Instagram, Letterboxd, AniList, MyAnimeList, Steam, Last.fm, Bandcamp, Genius, Coursera, Udemy, Khan Academy, MDN, Duolingo",
      "Custom activity now supports state line + image URL",
      "More reliable Discord gateway connection (cleaner identify, no buttons without app id)",
      "Site detects if the extension is installed and adapts the page",
      "New /download and /changelog pages on the website",
      "Lots of small bug fixes"
    ],
    next: ["Firefox build", "Spotify desktop sync", "Custom emoji status", "Steam game detection"]
  },
  pt: {
    tag: "Nova versão disponível.", newH: "O que há de novo", nextH: "A caminho", go: "Fixe — fechar",
    changes: [
      "Novo ícon minimalista com play",
      "13+ novas plataformas: Kick, GitLab, Claude, Gemini, Instagram, Letterboxd, AniList, MyAnimeList, Steam, Last.fm, Bandcamp, Genius, Coursera, Udemy, Khan, MDN, Duolingo",
      "Atividade personalizada agora com linha de estado e URL de imagem",
      "Ligação ao Discord mais fiável (identify mais limpo, sem botões sem app id)",
      "O site deteta se a extensão está instalada e adapta-se",
      "Novas páginas /download e /changelog no site",
      "Várias correções"
    ],
    next: ["Versão Firefox", "Sincronização Spotify desktop", "Emoji personalizado no estado", "Deteção de jogos Steam"]
  },
  es: {
    tag: "Nueva versión disponible.", newH: "Novedades", nextH: "Próximamente", go: "Genial — cerrar",
    changes: [
      "Nuevo icono minimalista con play",
      "13+ plataformas nuevas: Kick, GitLab, Claude, Gemini, Instagram, Letterboxd, AniList, MyAnimeList, Steam, Last.fm, Bandcamp, Genius, Coursera, Udemy, Khan, MDN, Duolingo",
      "Actividad personalizada con línea de estado y URL de imagen",
      "Conexión a Discord más fiable",
      "El sitio detecta si la extensión está instalada",
      "Nuevas páginas /download y /changelog",
      "Varias correcciones"
    ],
    next: ["Build para Firefox", "Sincronización Spotify desktop", "Emoji personalizado", "Detección de juegos Steam"]
  }
};
async function apply(l){
  const d = D[l] || D.en;
  document.querySelectorAll("[data-k]").forEach(e=>{ if(typeof d[e.dataset.k]==="string") e.textContent = d[e.dataset.k]; });
  document.getElementById("changes").innerHTML = d.changes.map(c=>`<li>${c}</li>`).join("");
  document.getElementById("next").innerHTML = d.next.map(c=>`<li>${c}</li>`).join("");
  await chrome.storage?.local?.set?.({ lang:l });
}
(async()=>{
  const cfg = await chrome.storage?.local?.get?.(["lang"]) || {};
  let l = cfg.lang || (navigator.language||"en").slice(0,2);
  if(!D[l]) l="en";
  document.getElementById("wlang").value = l;
  document.getElementById("ver").textContent = "v" + (chrome.runtime.getManifest().version);
  apply(l);
  await chrome.storage?.local?.set?.({ lastSeenVersion: chrome.runtime.getManifest().version });
})();
document.getElementById("wlang").addEventListener("change", e=>apply(e.target.value));
</script>
</body>
</html>
